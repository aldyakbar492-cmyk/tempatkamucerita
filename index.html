<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>Langit Curhatan — 2.0</title>
    <!-- Font modern: Poppins & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* ===== RESET & DASAR ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        height: 100vh;
        min-height: 100vh;
        background: radial-gradient(circle at bottom, #0b1a2e, #010208 85%);
        overflow: hidden;
        font-family: "Outfit", "Poppins", sans-serif;
        color: #f0f2fa;
        position: relative;
        perspective: 1200px;
        display: flex;
        flex-direction: column;
      }

      /* ===== LANGIT & BINTANG ===== */
      #space-container {
        position: absolute;
        inset: -100px;
        z-index: 1;
        transition: transform 0.15s ease-out;
        pointer-events: none;
        width: calc(100% + 200px);
        height: calc(100% + 200px);
      }
      .star {
        position: absolute;
        border-radius: 50%;
        cursor: pointer;
        transform: translate(-50%, -50%);
        animation: twinkleAndPulse 4s infinite alternate ease-in-out;
        z-index: 5;
        transition:
          transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
          filter 0.4s;
        pointer-events: auto;
        box-shadow: 0 0 12px rgba(255, 255, 240, 0.3);
        will-change: transform, opacity;
      }
      .star:hover {
        transform: translate(-50%, -50%) scale(2.6);
        filter: brightness(1.3) drop-shadow(0 0 12px #b8a2ff);
      }
      @keyframes twinkleAndPulse {
        0% {
          opacity: 0.3;
          transform: translate(-50%, -50%) scale(0.8);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.1);
        }
        100% {
          opacity: 0.3;
          transform: translate(-50%, -50%) scale(0.9);
        }
      }

      /* ===== HUJAN ===== */
      .rain-drop {
        position: absolute;
        background: linear-gradient(to bottom, transparent, rgba(200, 210, 255, 0.35));
        width: 1px;
        height: 40px;
        pointer-events: none;
        animation: fall linear infinite;
        z-index: 3;
      }
      @keyframes fall {
        to {
          transform: translateY(110vh);
        }
      }

      /* ===== SHOOTING STAR ===== */
      .shooting-star {
        position: absolute;
        width: 3px;
        height: 3px;
        background: linear-gradient(to right, transparent, #f0eaff, transparent);
        box-shadow: 0 0 20px 6px #b8a2ff;
        border-radius: 50%;
        animation: shoot 4.5s linear infinite;
        opacity: 0;
        z-index: 2;
      }
      @keyframes shoot {
        0% {
          transform: translate(-100vw, -10vh) rotate(-40deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        80% {
          opacity: 1;
        }
        100% {
          transform: translate(100vw, 110vh) rotate(-40deg);
          opacity: 0;
        }
      }

      /* ===== FLYING STAR ===== */
      .flying-star {
        position: fixed;
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        z-index: 5000;
        pointer-events: none;
        filter: blur(0.5px);
      }

      /* ===== HUG PARTICLE ===== */
      .hug-particle {
        position: absolute;
        background: linear-gradient(145deg, #ffe1b0, #b388ff);
        border-radius: 50%;
        animation: fadeOutAndFloat 1.4s forwards;
        pointer-events: none;
      }
      @keyframes fadeOutAndFloat {
        0% {
          transform: scale(0.4);
          opacity: 1;
        }
        100% {
          transform: scale(1.6) translateY(-30px);
          opacity: 0;
        }
      }

      /* ===== NAME POPUP ===== */
      #name-popup {
        position: fixed;
        inset: 0;
        background: rgba(1, 2, 8, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 6000;
        transition: opacity 0.6s ease;
        padding: 20px;
      }
      #name-popup.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .name-card {
        background: rgba(20, 28, 58, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 48px;
        padding: clamp(28px, 5vw, 40px) clamp(20px, 4vw, 32px);
        max-width: 440px;
        width: 100%;
        text-align: center;
        box-shadow:
          0 30px 60px -20px rgba(0, 0, 0, 0.8),
          0 0 0 1px rgba(255, 255, 255, 0.02);
      }
      .name-card h2 {
        font-weight: 400;
        font-size: clamp(1.5rem, 5vw, 1.9rem);
        letter-spacing: -0.5px;
        color: #fff;
        margin-bottom: 6px;
      }
      .name-card .sub {
        color: #9aa4c8;
        font-size: clamp(0.8rem, 2vw, 0.95rem);
        margin-bottom: 24px;
        font-weight: 300;
      }
      .name-card input {
        width: 100%;
        padding: clamp(14px, 2.5vw, 16px) 18px;
        border-radius: 40px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
        color: #fff;
        font-size: clamp(0.9rem, 2vw, 1rem);
        font-family: inherit;
        outline: none;
        transition: 0.2s;
        margin-bottom: 22px;
        text-align: center;
      }
      .name-card input:focus {
        border-color: #a777e3;
        box-shadow: 0 0 0 4px rgba(167, 119, 227, 0.15);
      }
      .name-card .btn-primary {
        background: linear-gradient(145deg, #7c5cbf, #a777e3);
        border: none;
        padding: clamp(12px, 2vw, 14px) 24px;
        border-radius: 60px;
        color: white;
        font-weight: 600;
        font-size: clamp(0.95rem, 2vw, 1.05rem);
        cursor: pointer;
        width: 100%;
        letter-spacing: 0.5px;
        box-shadow: 0 8px 24px rgba(167, 119, 227, 0.3);
        transition: 0.2s;
      }
      .name-card .btn-primary:hover {
        transform: scale(1.02);
        box-shadow: 0 12px 32px rgba(167, 119, 227, 0.5);
      }

      /* ===== GREETING ===== */
      #greeting-area {
        position: fixed;
        top: clamp(14px, 3vh, 30px);
        left: clamp(14px, 3vw, 30px);
        z-index: 100;
        font-weight: 300;
        letter-spacing: 0.2px;
        pointer-events: none;
        backdrop-filter: blur(6px);
        padding: clamp(4px, 0.6vw, 6px) clamp(12px, 1.5vw, 16px) clamp(4px, 0.6vw, 6px) clamp(10px, 1.2vw, 12px);
        border-radius: 60px;
        background: rgba(10, 15, 30, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.02);
        font-size: clamp(0.75rem, 1.8vw, 1rem);
        max-width: 70vw;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #greeting-area .greet-name {
        font-weight: 500;
        background: linear-gradient(135deg, #d4c2ff, #b388ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #greeting-area .greet-emoji {
        margin-right: 4px;
      }

      /* ===== TOAST ===== */
      #toast-container {
        position: fixed;
        top: clamp(14px, 3vh, 28px);
        right: clamp(14px, 3vw, 28px);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 12px;
        pointer-events: none;
        max-width: min(380px, 90vw);
        width: calc(100% - 28px);
      }
      .toast {
        background: rgba(18, 26, 50, 0.65);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: clamp(18px, 2.5vw, 24px);
        padding: clamp(14px, 2vw, 18px) clamp(16px, 2.5vw, 24px);
        box-shadow:
          0 20px 40px -16px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.02);
        color: #eaeefb;
        font-size: clamp(0.8rem, 1.6vw, 0.95rem);
        font-weight: 400;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        pointer-events: auto;
        animation: slideToast 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        width: 100%;
        line-height: 1.5;
      }
      .toast .toast-icon {
        font-size: clamp(1.2rem, 2.5vw, 1.5rem);
        flex-shrink: 0;
        margin-top: 2px;
      }
      .toast .toast-msg {
        flex: 1;
        word-break: break-word;
      }
      @keyframes slideToast {
        0% {
          opacity: 0;
          transform: translateX(30px) scale(0.96);
        }
        100% {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
      }
      .toast.out {
        animation: slideOutToast 0.35s ease forwards;
      }
      @keyframes slideOutToast {
        0% {
          opacity: 1;
          transform: translateX(0);
        }
        100% {
          opacity: 0;
          transform: translateX(40px) scale(0.94);
        }
      }

      /* ===== ATMOSPHERE SWITCH ===== */
      #atmosphere-switch {
        position: fixed;
        top: clamp(14px, 3vh, 28px);
        left: 50%;
        transform: translateX(-50%);
        z-index: 120;
        background: rgba(12, 18, 40, 0.35);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-radius: 60px;
        padding: clamp(4px, 0.5vw, 6px) clamp(6px, 0.8vw, 8px);
        display: flex;
        gap: clamp(2px, 0.4vw, 4px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.4);
        flex-wrap: nowrap;
      }
      #atmosphere-switch button {
        background: transparent;
        border: none;
        color: rgba(220, 225, 255, 0.55);
        cursor: pointer;
        font-size: clamp(0.6rem, 1.3vw, 0.8rem);
        padding: clamp(6px, 0.8vw, 8px) clamp(10px, 1.5vw, 16px);
        border-radius: 40px;
        font-weight: 500;
        transition: 0.25s;
        font-family: inherit;
        letter-spacing: 0.3px;
        white-space: nowrap;
      }
      #atmosphere-switch button.active {
        background: rgba(167, 119, 227, 0.25);
        color: #f0f0ff;
        box-shadow: 0 0 0 1px rgba(167, 119, 227, 0.2);
      }

      /* ===== PANEL CURHAT ===== */
      .panel {
        position: fixed;
        bottom: clamp(16px, 3vh, 28px);
        left: 50%;
        transform: translateX(-50%);
        width: min(92%, 480px);
        max-width: 480px;
        background: rgba(16, 22, 48, 0.55);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        padding: clamp(16px, 2.5vw, 22px) clamp(16px, 2.5vw, 26px) clamp(20px, 3vw, 26px);
        border-radius: clamp(28px, 4vw, 40px);
        border: 1px solid rgba(255, 255, 255, 0.04);
        z-index: 100;
        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        box-shadow:
          0 20px 50px -20px #00000080,
          0 0 0 1px rgba(255, 255, 255, 0.02);
      }
      .panel.hidden {
        bottom: -500px;
        opacity: 0;
        pointer-events: none;
      }
      .panel .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: clamp(12px, 2vw, 16px);
        color: #b8c2e6;
        font-size: clamp(0.7rem, 1.4vw, 0.85rem);
        letter-spacing: 0.5px;
        flex-wrap: wrap;
        gap: 6px;
      }
      .panel .panel-header .close-panel {
        background: none;
        border: none;
        color: #ff7a7a;
        cursor: pointer;
        font-size: clamp(0.65rem, 1.2vw, 0.75rem);
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(255, 100, 100, 0.06);
        transition: 0.2s;
        min-height: 36px;
      }
      .panel .panel-header .close-panel:hover {
        background: rgba(255, 100, 100, 0.15);
      }
      .panel select,
      .panel input,
      .panel textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.03);
        border-radius: clamp(24px, 3vw, 30px);
        padding: clamp(12px, 1.8vw, 14px) clamp(14px, 2vw, 18px);
        margin-bottom: clamp(8px, 1.2vw, 12px);
        outline: none;
        color: #f0f2fa;
        font-family: inherit;
        font-size: clamp(0.85rem, 1.6vw, 0.95rem);
        transition: 0.2s;
        min-height: clamp(44px, 6vh, 52px);
      }
      .panel select option {
        background: #121b3a;
        color: #eee;
      }
      .panel select:focus,
      .panel input:focus,
      .panel textarea:focus {
        border-color: #8f7ae6;
        box-shadow: 0 0 0 4px rgba(167, 119, 227, 0.08);
      }
      .panel textarea {
        min-height: clamp(60px, 12vh, 80px);
        resize: vertical;
        border-radius: clamp(20px, 2.5vw, 24px);
      }
      .panel .btn-send {
        width: 100%;
        padding: clamp(14px, 2vw, 16px);
        border: none;
        border-radius: 60px;
        background: linear-gradient(145deg, #6e4fbb, #a777e3);
        color: white;
        font-weight: 600;
        font-size: clamp(0.9rem, 1.6vw, 1rem);
        cursor: pointer;
        letter-spacing: 0.5px;
        box-shadow: 0 8px 28px rgba(167, 119, 227, 0.25);
        transition: 0.2s;
        margin-top: 4px;
        min-height: clamp(48px, 6vh, 56px);
      }
      .panel .btn-send:hover {
        transform: scale(1.01);
        box-shadow: 0 12px 36px rgba(167, 119, 227, 0.4);
      }

      /* ===== TOGGLE PANEL BTN ===== */
      #toggle-panel-btn {
        position: fixed;
        bottom: clamp(18px, 3vh, 30px);
        right: clamp(18px, 3vw, 30px);
        width: clamp(52px, 7vw, 60px);
        height: clamp(52px, 7vw, 60px);
        border-radius: 50%;
        background: radial-gradient(circle at 30% 20%, #8b6fd4, #5a3f9e);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: white;
        font-size: clamp(1.4rem, 2.5vw, 1.8rem);
        cursor: pointer;
        z-index: 150;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.3),
          0 0 0 1px rgba(255, 255, 255, 0.02);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        backdrop-filter: blur(8px);
        touch-action: manipulation;
      }
      #toggle-panel-btn:hover {
        transform: scale(1.08);
      }
      #toggle-panel-btn:active {
        transform: scale(0.94);
      }

      /* ===== POPUP CURHAT ===== */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(1, 2, 8, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 300;
        animation: fadeOverlay 0.35s ease;
        padding: 20px;
      }
      @keyframes fadeOverlay {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }
      .popup {
        background: rgba(16, 22, 48, 0.7);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: clamp(32px, 5vw, 48px);
        padding: clamp(24px, 4vw, 32px) clamp(20px, 3vw, 28px);
        width: min(92%, 420px);
        max-width: 420px;
        text-align: center;
        box-shadow:
          0 40px 80px -20px #000000cc,
          0 0 0 1px rgba(255, 255, 255, 0.02);
        animation: zoomPopup 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      @keyframes zoomPopup {
        0% {
          transform: scale(0.92);
          opacity: 0.2;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .popup .popup-label {
        color: #b388ff;
        font-size: clamp(0.6rem, 1.2vw, 0.7rem);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .popup #popup-receiver {
        font-weight: 500;
        font-size: clamp(1.1rem, 2.5vw, 1.3rem);
        margin: 6px 0 12px;
        color: #fff;
        word-break: break-word;
      }
      .popup #popup-content {
        font-style: italic;
        color: #d0d6f0;
        line-height: 1.7;
        word-wrap: break-word;
        overflow-y: auto;
        margin: 8px 0 16px;
        padding: 4px 4px 0;
        max-height: 30vh;
        font-size: clamp(0.9rem, 1.6vw, 1rem);
        flex: 1 1 auto;
      }
      .popup .btn-hug,
      .popup .btn-delete {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.04);
        padding: clamp(10px, 1.5vw, 12px) 16px;
        border-radius: 40px;
        color: #eaeefb;
        cursor: pointer;
        margin-top: 8px;
        font-family: inherit;
        font-size: clamp(0.8rem, 1.3vw, 0.9rem);
        transition: 0.2s;
        backdrop-filter: blur(4px);
        min-height: 44px;
        touch-action: manipulation;
      }
      .popup .btn-hug {
        background: linear-gradient(145deg, #f5c792, #b388ff);
        border: none;
        color: #0b0e1a;
        font-weight: 600;
      }
      .popup .btn-delete {
        color: #ff8a8a;
        border-color: rgba(255, 100, 100, 0.15);
      }
      .popup .btn-delete:hover {
        background: rgba(255, 80, 80, 0.08);
      }
      .popup .btn-hug:hover {
        transform: scale(1.02);
      }

      /* ===== MUSIC VISUALIZER ===== */
      #music-visualizer {
        position: fixed;
        bottom: clamp(80px, 12vh, 100px);
        left: clamp(14px, 3vw, 30px);
        display: none;
        gap: 4px;
        z-index: 80;
      }
      .bar {
        width: 3px;
        height: clamp(14px, 2.5vh, 18px);
        background: #b388ff;
        animation: barBounce 0.6s ease-in-out infinite alternate;
        border-radius: 4px;
      }

      /* ===== RESPONSIVE BREAKPOINTS ===== */
      /* Mobile kecil ≤ 480px */
      @media (max-width: 480px) {
        #greeting-area {
          top: 10px;
          left: 10px;
          font-size: 0.7rem;
          padding: 3px 10px 3px 8px;
          max-width: 60vw;
        }
        #atmosphere-switch {
          top: 10px;
          padding: 3px 4px;
          gap: 2px;
        }
        #atmosphere-switch button {
          font-size: 0.55rem;
          padding: 4px 8px;
        }
        .panel {
          padding: 14px 14px 18px;
          border-radius: 24px;
          width: 94%;
        }
        .panel select,
        .panel input,
        .panel textarea {
          padding: 10px 12px;
          font-size: 0.8rem;
          min-height: 40px;
        }
        .panel .btn-send {
          padding: 12px;
          font-size: 0.85rem;
          min-height: 44px;
        }
        #toggle-panel-btn {
          width: 46px;
          height: 46px;
          bottom: 14px;
          right: 14px;
          font-size: 1.2rem;
        }
        .popup {
          padding: 20px 16px;
          border-radius: 28px;
          max-height: 95vh;
        }
        #toast-container {
          top: 10px;
          right: 10px;
          max-width: calc(100% - 20px);
          gap: 8px;
        }
        .toast {
          padding: 12px 16px;
          font-size: 0.75rem;
          border-radius: 18px;
        }
        .toast .toast-icon {
          font-size: 1.1rem;
        }
        #music-visualizer {
          bottom: 70px;
          left: 12px;
        }
        .bar {
          height: 12px;
        }
        .name-card {
          padding: 24px 18px;
          border-radius: 32px;
        }
        .name-card h2 {
          font-size: 1.3rem;
        }
        .name-card .sub {
          font-size: 0.75rem;
          margin-bottom: 18px;
        }
        .name-card input {
          padding: 12px 14px;
          font-size: 0.85rem;
        }
        .name-card .btn-primary {
          padding: 12px;
          font-size: 0.9rem;
        }
      }

      /* Mobile 481–767px */
      @media (min-width: 481px) and (max-width: 767px) {
        #greeting-area {
          font-size: 0.8rem;
          padding: 4px 12px 4px 10px;
        }
        #atmosphere-switch button {
          font-size: 0.65rem;
          padding: 6px 12px;
        }
        .panel {
          padding: 18px 18px 22px;
          width: 90%;
        }
        .popup {
          padding: 24px 20px;
        }
        #toast-container {
          max-width: calc(100% - 24px);
        }
      }

      /* Tablet 768–991px */
      @media (min-width: 768px) and (max-width: 991px) {
        #greeting-area {
          font-size: 0.9rem;
        }
        #atmosphere-switch button {
          font-size: 0.75rem;
          padding: 8px 14px;
        }
        .panel {
          max-width: 440px;
          padding: 20px 24px 24px;
        }
      }

      /* Laptop 992–1199px */
      @media (min-width: 992px) and (max-width: 1199px) {
        .panel {
          max-width: 460px;
        }
      }

      /* Desktop ≥ 1200px (default) */

      /* Landscape phone & tablet */
      @media (max-height: 500px) and (orientation: landscape) {
        #greeting-area {
          top: 6px;
          left: 8px;
          font-size: 0.65rem;
          padding: 2px 8px;
        }
        #atmosphere-switch {
          top: 6px;
          padding: 2px 4px;
        }
        #atmosphere-switch button {
          font-size: 0.5rem;
          padding: 3px 8px;
        }
        .panel {
          padding: 10px 14px 14px;
          border-radius: 20px;
          bottom: 10px;
          max-width: 400px;
        }
        .panel select,
        .panel input,
        .panel textarea {
          padding: 6px 10px;
          font-size: 0.7rem;
          min-height: 30px;
          margin-bottom: 6px;
        }
        .panel textarea {
          min-height: 40px;
        }
        .panel .btn-send {
          padding: 8px;
          font-size: 0.75rem;
          min-height: 34px;
        }
        #toggle-panel-btn {
          width: 38px;
          height: 38px;
          bottom: 8px;
          right: 8px;
          font-size: 1rem;
        }
        .popup {
          padding: 16px 14px;
          max-height: 85vh;
          border-radius: 24px;
        }
        .popup #popup-content {
          max-height: 20vh;
          font-size: 0.8rem;
        }
        .popup .btn-hug,
        .popup .btn-delete {
          padding: 6px 12px;
          font-size: 0.7rem;
          min-height: 30px;
          margin-top: 4px;
        }
        #toast-container {
          top: 6px;
          right: 6px;
          max-width: 260px;
          gap: 6px;
        }
        .toast {
          padding: 8px 12px;
          font-size: 0.65rem;
          border-radius: 14px;
        }
        .toast .toast-icon {
          font-size: 0.9rem;
        }
        #music-visualizer {
          bottom: 50px;
          left: 8px;
        }
        .bar {
          height: 10px;
        }
        .name-card {
          padding: 18px 16px;
          border-radius: 28px;
          max-width: 340px;
        }
        .name-card h2 {
          font-size: 1.2rem;
        }
        .name-card .sub {
          font-size: 0.7rem;
          margin-bottom: 14px;
        }
        .name-card input {
          padding: 8px 12px;
          font-size: 0.8rem;
          margin-bottom: 14px;
        }
        .name-card .btn-primary {
          padding: 10px;
          font-size: 0.8rem;
        }
      }

      /* ===== UTILITY ===== */
      .hidden {
        display: none !important;
      }
      .no-scroll {
        overflow: hidden;
      }

      /* memastikan background full */
      body,
      html {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <!-- ===== NAME POPUP ===== -->
    <div id="name-popup">
      <div class="name-card">
        <h2>🌌 Langit Curhatan</h2>
        <div class="sub">Tempat semua perasaan menemukan bintangnya.</div>
        <input type="text" id="name-input" placeholder="Siapa nama kamu?" maxlength="20" autofocus />
        <button class="btn-primary" id="name-submit">Lanjutkan ✦</button>
      </div>
    </div>

    <!-- ===== GREETING ===== -->
    <div id="greeting-area">
      <span class="greet-emoji" id="greet-emoji">🌙</span>
      <span id="greet-text">Selamat malam,</span>
      <span class="greet-name" id="greet-name">Bintang</span>
    </div>

    <!-- ===== ATMOSPHERE ===== -->
    <div id="atmosphere-switch">
      <button id="btn-music1" class="active" onclick="changeAtmosphere('default')">Galaksi</button>
      <button id="btn-music2" onclick="changeAtmosphere('rain')">Hujan</button>
      <button id="btn-music3" onclick="changeAtmosphere('ambient')">Sunyi</button>
    </div>

    <!-- ===== SPACE + RAIN ===== -->
    <div id="space-container"></div>
    <div id="rain-container"></div>

    <!-- ===== TOAST ===== -->
    <div id="toast-container"></div>

    <!-- ===== MUSIC ===== -->
    <audio id="bgMusic" loop preload="auto">
      <source id="musicSource" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg" />
    </audio>
    <div id="music-visualizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <!-- ===== TOGGLE PANEL ===== -->
    <button id="toggle-panel-btn" onclick="togglePanelVisibility()">
      <span id="toggle-icon">✎</span>
    </button>

    <!-- ===== PANEL CURHAT ===== -->
    <div class="panel" id="main-panel">
      <div class="panel-header">
        <span>😊 Tuliskan perasaanmu</span>
        <button class="close-panel" onclick="togglePanelVisibility()">✕ Tutup</button>
      </div>
      <select id="emosi">
        <option value="#ffffff">Perasaan: Netral</option>
        <option value="#ffeb3b">Senang (Kuning)</option>
        <option value="#ff5252">Lelah / Marah (Merah)</option>
        <option value="#80d8ff">Sedih (Biru)</option>
        <option value="#b388ff">Rindu (Ungu)</option>
      </select>
      <input type="text" id="tujuan" placeholder="Pesan ini untuk siapa?" />
      <textarea id="curhat" placeholder="Tumpahkan perasaanmu di sini…" rows="2"></textarea>
      <button class="btn-send" id="btn-send" onclick="sendSequence()">✦ Terbangkan ke Langit</button>
    </div>

    <!-- ===== POPUP CURHAT ===== -->
    <div id="overlay" class="overlay" onclick="closePopup()">
      <div class="popup" onclick="event.stopPropagation()">
        <div class="popup-label">✧ ditujukan untuk</div>
        <h3 id="popup-receiver" style="margin: 2px 0 8px; color: #fff"></h3>
        <div id="popup-content"></div>
        <button class="btn-hug" onclick="sendHug()">🤍 Kirim Pelukan</button>
        <button class="btn-delete" onclick="deleteOneStar()">Hapus Bintang</button>
      </div>
    </div>

    <script>
      // ============================================================
      // DATA & STATE
      // ============================================================
      let starsData = JSON.parse(localStorage.getItem("langit_stars_v2") || "[]");
      let selectedIndex = null;
      let rainInterval = null;
      let userName = localStorage.getItem("langit_user_name") || "";

      const music = document.getElementById("bgMusic");
      const musicSource = document.getElementById("musicSource");
      const container = document.getElementById("space-container");

      // ============================================================
      // TOAST SYSTEM
      // ============================================================
      function showToast(icon, message, duration = 3800) {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `<span class="toast-icon">${icon}</span><span class="toast-msg">${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
          toast.classList.add("out");
          setTimeout(() => toast.remove(), 400);
        }, duration);
      }

      // ============================================================
      // USER NAME LOGIC
      // ============================================================
      function getUserName() {
        if (!userName) {
          const stored = localStorage.getItem("langit_user_name");
          if (stored) userName = stored;
        }
        return userName;
      }

      function setUserName(name) {
        userName = name.trim();
        localStorage.setItem("langit_user_name", userName);
      }

      function getGreeting() {
        const h = new Date().getHours();
        if (h >= 5 && h < 12) return { emoji: "☀️", text: "Selamat pagi" };
        if (h >= 12 && h < 16) return { emoji: "🌤️", text: "Selamat siang" };
        if (h >= 16 && h < 19) return { emoji: "🌇", text: "Selamat sore" };
        return { emoji: "🌙", text: "Selamat malam" };
      }

      function updateGreeting() {
        const name = getUserName() || "Bintang";
        const g = getGreeting();
        document.getElementById("greet-emoji").innerText = g.emoji;
        document.getElementById("greet-text").innerText = g.text + ",";
        document.getElementById("greet-name").innerText = name;
      }

      // ============================================================
      // NAME POPUP
      // ============================================================
      function initNamePopup() {
        const popup = document.getElementById("name-popup");
        const input = document.getElementById("name-input");
        const submitBtn = document.getElementById("name-submit");

        if (getUserName()) {
          popup.classList.add("hidden");
          updateGreeting();
          startMusicAndRender();
          return;
        }

        popup.classList.remove("hidden");

        function handleName() {
          const val = input.value.trim();
          if (val.length < 1) {
            showToast("🌱", "Tulis nama dulu ya, biar langit kenal kamu.");
            return;
          }
          setUserName(val);
          popup.classList.add("hidden");
          updateGreeting();
          startMusicAndRender();
          showToast("👋", `Halo ${val}, selamat datang di Langit Curhatan.`);
        }

        submitBtn.addEventListener("click", handleName);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") handleName();
        });
        input.focus();
      }

      // ============================================================
      // STARTUP
      // ============================================================
      function startMusicAndRender() {
        music.play().catch(() => {});
        document.getElementById("music-visualizer").style.display = "flex";
        renderStars();
        setInterval(createShootingStar, 7000);
      }

      // ============================================================
      // PANEL TOGGLE
      // ============================================================
      function togglePanelVisibility() {
        const panel = document.getElementById("main-panel");
        const icon = document.getElementById("toggle-icon");
        panel.classList.toggle("hidden");
        icon.innerText = panel.classList.contains("hidden") ? "✎" : "✖";
      }

      // ============================================================
      // SEND CURHAT
      // ============================================================
      function sendSequence() {
        const text = document.getElementById("curhat").value.trim();
        if (!text) {
          showToast("🌿", "Tuliskan dulu perasaanmu, biar jadi bintang.");
          return;
        }
        const name = getUserName() || "Bintang";
        const randomQuote = sendQuotes[Math.floor(Math.random() * sendQuotes.length)];
        runTypingEffect(randomQuote, (q) => {
          animateStarFlight(q);
          togglePanelVisibility();
          showToast("✨", `Terima kasih, ${name}. Curhatanmu sudah menjadi sebuah bintang. Semoga malam ini terasa lebih ringan.`);
        });
      }

      // ============================================================
      // QUOTES & FLYING STAR
      // ============================================================
      const sendQuotes = [
        { text: "Melepaskan bebanmu ke angkasa…", color: "#a777e3", speed: "2.5s", glow: "#6e8efb" },
        { text: "Biarkan bintang mendekap rahasiamu pelan-pelan.", color: "#88ccff", speed: "4s", glow: "#ffffff" },
        { text: "Satu bintang lagi lahir dari sebuah keberanian.", color: "#ffcc88", speed: "1.5s", glow: "#ffaa00" },
        { text: "Tenanglah, pesanmu kini abadi di pelukan malam.", color: "#ffffff", speed: "3s", glow: "#a777e3" },
      ];

      function animateStarFlight(quote) {
        const btn = document.getElementById("btn-send");
        const rect = btn.getBoundingClientRect();
        const targetX = Math.random() * 90 + 5;
        const targetY = Math.random() * 60 + 5;
        const color = document.getElementById("emosi").value;

        const flyingStar = document.createElement("div");
        flyingStar.className = "flying-star";
        flyingStar.style.left = rect.left + rect.width / 2 + "px";
        flyingStar.style.top = rect.top + "px";
        flyingStar.style.background = color;
        flyingStar.style.boxShadow = `0 0 20px 5px ${color}, 0 0 40px 10px ${quote.glow}`;
        flyingStar.style.transition = `all ${quote.speed} cubic-bezier(0.2, 0, 0.2, 1)`;
        document.body.appendChild(flyingStar);

        setTimeout(() => {
          flyingStar.style.left = targetX + "vw";
          flyingStar.style.top = targetY + "vh";
          flyingStar.style.transform = "scale(0.3)";
        }, 50);

        setTimeout(
          () => {
            saveCurhat(targetX, targetY, color);
            flyingStar.remove();
          },
          parseFloat(quote.speed) * 1000,
        );
      }

      function saveCurhat(x, y, color) {
        const inputPesan = document.getElementById("curhat");
        const inputTujuan = document.getElementById("tujuan");
        starsData.push({
          text: inputPesan.value,
          to: inputTujuan.value || "Seseorang",
          x: x.toFixed(2),
          y: y.toFixed(2),
          color: color,
          size: Math.random() * 4 + 3,
        });
        localStorage.setItem("langit_stars_v2", JSON.stringify(starsData));
        inputPesan.value = "";
        inputTujuan.value = "";
        renderStars();
      }

      // ============================================================
      // RENDER STARS
      // ============================================================
      function renderStars() {
        container.innerHTML = "";
        starsData.forEach((starObj, index) => {
          const star = document.createElement("div");
          star.className = "star";
          star.style.left = starObj.x + "%";
          star.style.top = starObj.y + "%";
          star.style.width = (starObj.size || 5) + "px";
          star.style.height = (starObj.size || 5) + "px";
          star.style.backgroundColor = starObj.color || "white";
          star.style.boxShadow = `0 0 12px ${starObj.color || "white"}`;
          star.style.animationDelay = Math.random() * 4 + "s";
          star.onclick = (e) => {
            e.stopPropagation();
            selectedIndex = index;
            document.getElementById("popup-receiver").innerText = starObj.to || "Seseorang";
            document.getElementById("popup-content").innerText = `“${starObj.text}”`;
            document.getElementById("overlay").style.display = "flex";
          };
          container.appendChild(star);
        });
      }

      // ============================================================
      // POPUP ACTIONS
      // ============================================================
      function closePopup() {
        document.getElementById("overlay").style.display = "none";
      }

      function deleteOneStar() {
        if (selectedIndex === null) return;
        const name = getUserName() || "Bintang";
        starsData.splice(selectedIndex, 1);
        localStorage.setItem("langit_stars_v2", JSON.stringify(starsData));
        closePopup();
        renderStars();
        showToast("🌠", `${name}, bintang itu telah kembali menjadi cahaya.`);
      }

      function sendHug() {
        if (selectedIndex === null) return;
        const name = getUserName() || "Bintang";
        const allStars = document.querySelectorAll(".star");
        const targetStar = allStars[selectedIndex];
        if (targetStar) {
          const rect = targetStar.getBoundingClientRect();
          for (let i = 0; i < 12; i++) {
            const particle = document.createElement("div");
            particle.className = "hug-particle";
            particle.style.width = Math.random() * 6 + 3 + "px";
            particle.style.height = particle.style.width;
            particle.style.left = rect.left + rect.width / 2 + (Math.random() - 0.5) * 24 + "px";
            particle.style.top = rect.top + rect.height / 2 + (Math.random() - 0.5) * 24 + "px";
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 1500);
          }
        }
        closePopup();
        showToast("🤍", `Pelukanmu sudah dikirim, ${name}. Semoga seseorang di sana merasakan hangatnya.`);
      }

      // ============================================================
      // TYPING EFFECT (fallback)
      // ============================================================
      function runTypingEffect(quoteObj, callback) {
        // langsung panggil callback, tidak pakai overlay
        if (callback) callback(quoteObj);
      }

      // ============================================================
      // ATMOSPHERE
      // ============================================================
      const audioTracks = {
        default: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3",
        rain: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        ambient: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
      };

      function changeAtmosphere(trackName) {
        changeMusic(trackName);
        const rainContainer = document.getElementById("rain-container");
        clearInterval(rainInterval);
        rainContainer.innerHTML = "";
        if (trackName === "rain") {
          rainInterval = setInterval(() => {
            const drop = document.createElement("div");
            drop.className = "rain-drop";
            drop.style.left = Math.random() * 100 + "vw";
            drop.style.animationDuration = Math.random() * 0.5 + 0.4 + "s";
            rainContainer.appendChild(drop);
            setTimeout(() => drop.remove(), 1000);
          }, 50);
        }
      }

      function changeMusic(trackName) {
        music.pause();
        musicSource.src = audioTracks[trackName];
        music.load();
        music.play().catch(() => {});
        document.querySelectorAll("#atmosphere-switch button").forEach((btn, i) => {
          const tracks = Object.keys(audioTracks);
          btn.classList.toggle("active", tracks[i] === trackName);
        });
      }

      // ============================================================
      // SHOOTING STAR
      // ============================================================
      function createShootingStar() {
        const s = document.createElement("div");
        s.className = "shooting-star";
        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 20 + "vh";
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 4500);
      }

      // ============================================================
      // MOUSE PARALLAX
      // ============================================================
      document.addEventListener("mousemove", (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 50;
        const y = (window.innerHeight / 2 - e.pageY) / 50;
        container.style.transform = `translateX(${x}px) translateY(${y}px)`;
      });

      // ============================================================
      // INIT
      // ============================================================
      initNamePopup();
      if (getUserName()) updateGreeting();

      // hapus loading overlay jika ada
      (function removeLoadingOverlay() {
        const el = document.getElementById("loading-overlay");
        if (el) el.remove();
      })();

      console.log("🌌 Langit Curhatan 2.0 — fully responsive");
    </script>
  </body>
</html>
